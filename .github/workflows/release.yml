name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
