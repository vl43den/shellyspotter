name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Generate release SBOM
        run: |
          mkdir -p release-assets
          dotnet CycloneDX ShellySpotter.sln -o ./release-assets -F Json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image digest list
        run: |
          set -euo pipefail
          mkdir -p release-assets
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "release_tag=${GITHUB_REF_NAME}"
            echo "commit_sha=${GITHUB_SHA}"
            echo "image_tag=${SHORT_SHA}"
            echo ""
          } > release-assets/image-digests.txt

          for service in core token-ms webapp agent; do
            IMAGE="ghcr.io/${GITHUB_REPOSITORY}-${service}:${SHORT_SHA}"
            if docker pull "$IMAGE" > /dev/null 2>&1; then
              REPO_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")"
              echo "${service}=${REPO_DIGEST}" >> release-assets/image-digests.txt
            else
              echo "${service}=NOT_FOUND (expected ${IMAGE})" >> release-assets/image-digests.txt
            fi
          done

      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/bom.json
            release-assets/image-digests.txt
          fail_on_unmatched_files: true
